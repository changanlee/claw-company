<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Company Stage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f23; overflow: hidden; }
    #game-container { width: 100vw; height: 100vh; }
    #lang-switch {
      position: fixed; top: 10px; right: 10px; z-index: 1000;
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #lang-switch:hover { background: #334155; color: #e2e8f0; }
    #panel-toggle {
      position: fixed; top: 10px; right: 60px; z-index: 1000;
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 16px;
    }
    #data-panel {
      position: fixed; top: 0; right: -320px; width: 320px; height: 100vh;
      background: #0f172aee; border-left: 1px solid #334155; z-index: 999;
      padding: 16px; overflow-y: auto; transition: right 0.3s ease;
      font-family: monospace; color: #e2e8f0; font-size: 13px;
    }
    #data-panel.open { right: 0; }
    #data-panel h3 { margin-bottom: 12px; color: #60a5fa; }
    #data-panel h4 { margin: 16px 0 8px; color: #94a3b8; font-size: 12px; }
    .panel-agent { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .panel-agent .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .panel-agent .name { flex: 1; }
    .panel-agent .status { color: #64748b; }
    .panel-event { padding: 3px 0; border-bottom: 1px solid #1e293b; }
    .panel-event .time { color: #475569; margin-right: 6px; }
  </style>
</head>
<body>
  <button id="panel-toggle" title="Dashboard">📊</button>
  <div id="data-panel">
    <h3 id="panel-title">Dashboard</h3>
    <div id="panel-agents"></div>
    <h4>Event Log</h4>
    <div id="panel-events"></div>
  </div>
  <button id="lang-switch" onclick="location.search='?lang=' + (I18n.lang() === 'en' ? 'zh-TW' : 'en')">
    EN / 中文
  </button>
  <div id="game-container"></div>

  <!-- Load order matters: vendor → data → modules → entry -->
  <script src="/js/vendor/phaser.min.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/agents.js"></script>
  <script src="/js/chairman.js"></script>
  <script src="/js/interactions.js"></script>
  <script src="/js/panel.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
